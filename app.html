<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <style>
    :root { --neon: #ff003c; --neon-glow: rgba(255, 0, 60, 0.8); --bg: #050505; --card: #151515; }
    body { font-family: sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 0; }
    #calendar-container { padding: 5px; background: radial-gradient(circle at top, #1a050a 0%, var(--bg) 80%); }
    .fc-toolbar-title { font-weight: bold !important; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    .fc-event.confirmed-ultra { background: linear-gradient(45deg, var(--neon), #ff4d79) !important; border: none !important; box-shadow: 0 0 15px var(--neon-glow); animation: neonPulse 1.5s infinite ease-in-out; font-weight: bold; }
    @keyframes neonPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: flex-end; }
    .modal-content { background: var(--card); width: 100%; max-width: 500px; padding: 25px; border-radius: 30px 30px 0 0; border-top: 4px solid var(--neon); box-sizing: border-box; animation: slideUp 0.3s ease-out; overflow: hidden; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    h3 { margin-top: 0; text-align: center; color: var(--neon); }
    label { display: block; font-size: 0.8em; color: #777; margin-bottom: 8px; }
    select, input { width: 100%; padding: 15px; margin-bottom: 20px; background: #222; border: 1px solid #444; border-radius: 12px; color: #fff; font-size: 1.1em; box-sizing: border-box; display: block; outline: none; }
    select:focus, input:focus { border-color: var(--neon); }

    .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1em; cursor: pointer; margin-bottom: 10px; display: block; box-sizing: border-box; transition: 0.2s; }
    .btn:active { transform: scale(0.98); opacity: 0.8; }
    .btn-save { background: var(--neon); color: #fff; box-shadow: 0 0 15px var(--neon-glow); }
    .btn-confirm { background: #00ffcc; color: #000; }
    .btn-danger { background: #333; color: var(--neon); border: 1px solid var(--neon); }
    .btn-cancel { background: transparent; color: #666; }

    .event-list-item { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
    .status-badge { font-size: 0.75em; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
    .is-confirmed { background: var(--neon); color: white; box-shadow: 0 0 10px var(--neon); }

    #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
    .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--neon); border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 15px var(--neon-glow); }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="color:var(--neon); margin-top:15px; font-weight:bold;">LOADING...</p></div>
<div id="calendar-container"><div id="calendar"></div></div>

<div id="day-modal" class="modal"><div class="modal-content">
  <h3 id="target-date-title">日付</h3>
  <div id="day-event-list" style="max-height: 40vh; overflow-y: auto; margin-bottom: 20px;"></div>
  <button class="btn btn-save" onclick="openRegModal()">＋ 新しい希望を登録</button>
  <button class="btn btn-cancel" onclick="hideAllModals()">閉じる</button>
</div></div>

<div id="reg-modal" class="modal"><div class="modal-content">
  <h3>希望登録</h3>
  <label>担当者</label><select id="user-name"></select>
  <label>開始時間 (15:00〜)</label><select id="start-t"></select>
  <label>終了時間 (〜最終)</label><select id="end-t"></select>
  <button class="btn btn-save" onclick="saveEvent()">希望を送信</button>
  <button class="btn btn-cancel" onclick="backToDay()">戻る</button>
</div></div>

<div id="edit-modal" class="modal"><div class="modal-content">
  <h3 id="edit-title">シフト管理</h3>
  <div id="manage-buttons">
    <button id="confirm-btn-trigger" class="btn btn-confirm" onclick="openPinModal()">このシフトを確定する</button>
    <button class="btn btn-danger" onclick="openDeleteConfirm()">この予定を削除</button>
  </div>
  <button class="btn btn-cancel" onclick="backToDay()">戻る</button>
</div></div>

<div id="pin-modal" class="modal"><div class="modal-content">
  <h3>管理者認証</h3>
  <label>暗証番号を入力してください</label>
  <input type="password" id="pin" pattern="\d*" inputmode="numeric" placeholder="数字4桁">
  <button class="btn btn-save" onclick="executeConfirm()">認証して確定</button>
  <button class="btn btn-cancel" onclick="closePinModal()">キャンセル</button>
</div></div>

<div id="delete-confirm-modal" class="modal"><div class="modal-content">
  <h3 style="color:var(--neon);">削除の最終確認</h3>
  <p style="text-align:center; color:#888; margin-bottom:25px;">この予定を削除してもよろしいですか？</p>
  <button class="btn btn-save" style="background:#cc0000" onclick="finalDeleteAction()">本当に削除する</button>
  <button class="btn btn-cancel" onclick="closeDeleteConfirm()">やめる</button>
</div></div>

<div id="alert-modal" class="modal"><div class="modal-content">
  <h3 id="alert-title">通知</h3>
  <p id="alert-msg" style="text-align:center; color:#ccc; margin-bottom:25px;"></p>
  <button class="btn btn-save" onclick="closeAlert()">OK</button>
</div></div>

<script>
  let calendar; let selectedDateStr; let currentEventId; let allEvents = [];

  function initTimeSelect() {
    const s = document.getElementById('start-t'); const e = document.getElementById('end-t');
    for(let h=15; h<24; h++) { ['00','30'].forEach(m => s.add(new Option(`${h}:${m}`, `${h}:${m}`))); }
    for(let h=15; h<24; h++) { ['00','30'].forEach(m => { if(!(h==15&&m=='00')) e.add(new Option(`${h}:${m}`, `${h}:${m}`)); }); }
    for(let h=0; h<=2; h++) { ['00','30'].forEach(m => e.add(new Option(`${h}:${m}`, `${h}:${m}`))); }
    e.add(new Option("最終まで", "最終まで"));
    // 初期値設定
    s.value = "19:00"; 
    e.value = "最終まで";
  }

  document.addEventListener('DOMContentLoaded', function() {
    initTimeSelect();
    calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      initialView: 'dayGridMonth', locale: 'ja', headerToolbar: { left: 'prev', center: 'title', right: 'next' },
      eventClassNames: (arg) => arg.event.extendedProps.isConfirmed ? ['confirmed-ultra'] : [],
      events: (info, success) => google.script.run.withSuccessHandler(data => { allEvents=data; success(data); }).getEvents(),
      dateClick: (info) => { selectedDateStr = info.dateStr; openDayModal(info.dateStr); },
      eventClick: (info) => { info.jsEvent.preventDefault(); currentEventId = info.event.id; openEditModal(info.event); }
    });
    calendar.render();
    google.script.run.withSuccessHandler(m => { const sel = document.getElementById('user-name'); m.forEach(name => sel.add(new Option(name, name))); }).getMembers();
  });

  function openDayModal(dateStr) {
    selectedDateStr = dateStr; document.getElementById('target-date-title').innerText = dateStr;
    const list = document.getElementById('day-event-list'); list.innerHTML = '';
    const dayEvents = allEvents.filter(e => e.start.startsWith(dateStr));
    dayEvents.sort((a, b) => a.start.localeCompare(b.start));
    if(!dayEvents.length) list.innerHTML = '<p style="text-align:center; color:#444;">予定なし</p>';
    dayEvents.forEach(e => {
      const div = document.createElement('div'); div.className = 'event-list-item';
      div.onclick = () => { currentEventId = e.id; openEditModal(e); };
      div.innerHTML = `<div><strong>${e.title}</strong></div><span class="status-badge ${e.extendedProps.isConfirmed ? 'is-confirmed' : ''}">${e.extendedProps.isConfirmed ? '確定' : '希望'}</span>`;
      list.appendChild(div);
    });
    hideAllModals(); document.getElementById('day-modal').style.display = 'flex';
  }

  function openRegModal() { hideAllModals(); document.getElementById('reg-modal').style.display = 'flex'; }
  function openEditModal(e) { 
    hideAllModals(); 
    currentEventId = e.id || currentEventId; 
    const title = e.title || "詳細";
    document.getElementById('edit-title').innerText = title; 
    const isConf = e.extendedProps ? e.extendedProps.isConfirmed : title.includes('★確定');
    document.getElementById('confirm-btn-trigger').style.display = isConf ? 'none' : 'block'; 
    document.getElementById('edit-modal').style.display = 'flex'; 
  }
  
  function openPinModal() { document.getElementById('edit-modal').style.display = 'none'; document.getElementById('pin-modal').style.display = 'flex'; }
  function closePinModal() { document.getElementById('pin-modal').style.display = 'none'; document.getElementById('edit-modal').style.display = 'flex'; }
  function openDeleteConfirm() { document.getElementById('edit-modal').style.display = 'none'; document.getElementById('delete-confirm-modal').style.display = 'flex'; }
  function closeDeleteConfirm() { document.getElementById('delete-confirm-modal').style.display = 'none'; document.getElementById('edit-modal').style.display = 'flex'; }

  function showAlert(title, msg) { document.getElementById('alert-title').innerText = title; document.getElementById('alert-msg').innerText = msg; document.getElementById('alert-modal').style.display = 'flex'; }
  function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }
  function backToDay() { openDayModal(selectedDateStr); }
  function hideAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('pin').value = ''; }
  function showLoading(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }

  function saveEvent() {
    showLoading(true);
    google.script.run.withSuccessHandler(() => { showLoading(false); hideAllModals(); calendar.refetchEvents(); showAlert("完了", "送信しました"); })
      .createShiftEvent(selectedDateStr, document.getElementById('start-t').value, document.getElementById('end-t').value, document.getElementById('user-name').value);
  }

  function executeConfirm() {
    const pin = document.getElementById('pin').value;
    if(!pin) return showAlert("エラー", "暗証番号が必要です");
    showLoading(true);
    google.script.run.withSuccessHandler(() => { showLoading(false); hideAllModals(); calendar.refetchEvents(); showAlert("成功", "確定しました"); })
      .withFailureHandler(err => { showLoading(false); showAlert("エラー", err.message); }).confirmEvent(currentEventId, pin);
  }

  function finalDeleteAction() {
    showLoading(true);
    google.script.run.withSuccessHandler(() => { showLoading(false); hideAllModals(); calendar.refetchEvents(); showAlert("完了", "削除しました"); }).deleteEvent(currentEventId);
  }
</script>
</body>
</html>
