<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <style>
    :root { --neon: #ff003c; --neon-glow: rgba(255, 0, 60, 0.8); --bg: #050505; --card: #151515; }
    body { font-family: sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 0; }
    
    /* гӮ«гғ¬гғігғҖгғје…ЁдҪ“гҒ®гғҮгӮ¶гӮӨгғіиӘҝж•ҙ */
    #calendar-container { padding: 5px; background: radial-gradient(circle at top, #1a050a 0%, var(--bg) 80%); }
    .fc { max-width: 100%; background: transparent; font-size: 0.9em; }
    .fc-toolbar-title { font-weight: bold !important; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

    /* жӣңж—ҘгғҳгғғгғҖгғј */
    .fc-col-header-cell { background: rgba(255, 255, 255, 0.03); padding: 8px 0 !important; color: #777 !important; font-weight: 300 !important; text-transform: uppercase; }
    
    /* ж—Ҙд»ҳж•°еӯ—пјҲгғҮгӮёгӮҝгғ«гғ•гӮ©гғігғҲйўЁпјү */
    .fc-daygrid-day-number { color: #555; font-family: monospace; padding: 4px !important; text-decoration: none !important; }
    .fc-day-today { background: rgba(255, 0, 60, 0.05) !important; }
    .fc-day-today .fc-daygrid-day-number { color: var(--neon); text-shadow: 0 0 5px var(--neon); font-weight: bold; }

    /* гӮӨгғҷгғігғҲгӮ’гҖҢе…үгӮӢгғүгғғгғҲгҖҚгҒ«еӨүжӣҙ */
    .fc-daygrid-event {
      background: rgba(255, 255, 255, 0.1) !important;
      border: none !important;
      border-radius: 50% !important;
      width: 7px !important;
      height: 7px !important;
      margin: 3px auto !important;
      min-height: 0 !important;
      display: block !important;
    }
    /* зўәе®ҡжёҲгҒҝгғүгғғгғҲпјҲеј·гҒҸзҷәе…үпјү */
    .confirmed-ultra {
      background: var(--neon) !important;
      box-shadow: 0 0 8px var(--neon), 0 0 15px var(--neon);
    }
    /* гӮӨгғҷгғігғҲгҒ®ж–Үеӯ—гӮ’йҡ гҒҷпјҲгғүгғғгғҲгҒ«гҒҷгӮӢгҒҹгӮҒпјү */
    .fc-event-title, .fc-event-time { display: none; }

    /* жһ з·ҡгӮ’йҖҸйҒҺгҒ•гҒӣгҒҰгӮ№гӮҝгӮӨгғӘгғғгӮ·гғҘгҒ« */
    .fc-theme-standard td, .fc-theme-standard th { border: 1px solid rgba(255, 255, 255, 0.05) !important; }
    .fc-theme-standard .fc-scrollgrid { border: none !important; }

    /* гғ„гғјгғ«гғҗгғјгғңгӮҝгғі */
    .fc-button { background: transparent !important; border: 1px solid #333 !important; color: var(--neon) !important; border-radius: 12px !important; }
    .fc-button-active { background: var(--neon) !important; color: #fff !important; }

    /* гғўгғјгғҖгғ«UI */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: flex-end; }
    .modal-content { background: var(--card); width: 100%; max-width: 500px; padding: 25px; border-radius: 30px 30px 0 0; border-top: 4px solid var(--neon); box-sizing: border-box; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    h3 { margin-top: 0; text-align: center; color: var(--neon); letter-spacing: 2px; }
    label { display: block; font-size: 0.8em; color: #666; margin-bottom: 8px; }
    select, input { width: 100%; padding: 15px; margin-bottom: 20px; background: #222; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 1.1em; box-sizing: border-box; display: block; outline: none; }
    select:focus, input:focus { border-color: var(--neon); }

    .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1em; cursor: pointer; margin-bottom: 10px; display: block; box-sizing: border-box; }
    .btn-save { background: var(--neon); color: #fff; box-shadow: 0 0 15px var(--neon-glow); }
    .btn-confirm { background: #00ffcc; color: #000; }
    .btn-danger { background: #333; color: var(--neon); border: 1px solid var(--neon); }
    .btn-cancel { background: transparent; color: #666; }

    .event-list-item { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
    .status-badge { font-size: 0.75em; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
    .is-confirmed { background: var(--neon); color: white; box-shadow: 0 0 10px var(--neon); }

    #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top: 4px solid var(--neon); border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 10px var(--neon); }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="color:var(--neon); margin-top:15px; font-size:0.8em; letter-spacing:3px;">LOADING</p></div>
<div id="calendar-container"><div id="calendar"></div></div>

<div id="day-modal" class="modal"><div class="modal-content">
  <h3 id="target-date-title">DATE</h3>
  <div id="day-event-list" style="max-height: 40vh; overflow-y: auto; margin-bottom: 20px;"></div>
  <button class="btn btn-save" onclick="openRegModal()">пјӢ ж–°гҒ—гҒ„еёҢжңӣгӮ’зҷ»йҢІ</button>
  <button class="btn btn-cancel" onclick="hideAllModals()">й–үгҒҳгӮӢ</button>
</div></div>

<div id="reg-modal" class="modal"><div class="modal-content">
  <h3>ENTRY</h3>
  <label>жӢ…еҪ“иҖ…</label><select id="user-name"></select>
  <label>й–Ӣе§ӢжҷӮй–“ (15:00гҖң)</label><select id="start-t"></select>
  <label>зөӮдәҶжҷӮй–“ (гҖңжңҖзөӮ)</label><select id="end-t"></select>
  <button class="btn btn-save" onclick="saveEvent()">еёҢжңӣгӮ’йҖҒдҝЎ</button>
  <button class="btn btn-cancel" onclick="backToDay()">жҲ»гӮӢ</button>
</div></div>

<div id="edit-modal" class="modal"><div class="modal-content">
  <h3>MANAGE</h3>
  <div id="manage-buttons">
    <button id="confirm-btn-trigger" class="btn btn-confirm" onclick="openPinModal()">гҒ“гҒ®гӮ·гғ•гғҲгӮ’зўәе®ҡгҒҷгӮӢ</button>
    <button class="btn btn-danger" onclick="openDeleteConfirm()">гҒ“гҒ®дәҲе®ҡгӮ’еүҠйҷӨ</button>
  </div>
  <button class="btn btn-cancel" onclick="backToDay()">жҲ»гӮӢ</button>
</div></div>

<div id="pin-modal" class="modal"><div class="modal-content">
  <h3>AUTH</h3>
  <label>жҡ—иЁјз•ӘеҸ·гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</label>
  <input type="password" id="pin" pattern="\d*" inputmode="numeric" placeholder="PASSCODE">
  <button class="btn btn-save" onclick="executeConfirm()">иӘҚиЁјгҒ—гҒҰзўәе®ҡ</button>
  <button class="btn btn-cancel" onclick="closePinModal()">гӮӯгғЈгғігӮ»гғ«</button>
</div></div>

<div id="delete-confirm-modal" class="modal"><div class="modal-content">
  <h3 style="color:var(--neon);">CONFIRM</h3>
  <p style="text-align:center; color:#888; margin-bottom:25px; font-size:0.9em;">гҒ“гҒ®дәҲе®ҡгӮ’еүҠйҷӨгҒ—гҒҰгӮӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ</p>
  <button class="btn btn-save" style="background:#cc0000" onclick="finalDeleteAction()">жң¬еҪ“гҒ«еүҠйҷӨгҒҷгӮӢ</button>
  <button class="btn btn-cancel" onclick="closeDeleteConfirm()">гӮ„гӮҒгӮӢ</button>
</div></div>

<div id="alert-modal" class="modal"><div class="modal-content">
  <h3 id="alert-title">INFO</h3>
  <p id="alert-msg" style="text-align:center; color:#ccc; margin-bottom:25px;"></p>
  <button class="btn btn-save" onclick="closeAlert()">OK</button>
</div></div>

<script>
  let calendar; let selectedDateStr; let currentEventId; let allEvents = [];

  function initTimeSelect() {
    const s = document.getElementById('start-t'); const e = document.getElementById('end-t');
    for(let h=15; h<24; h++) { ['00','30'].forEach(m => s.add(new Option(`${h}:${m}`, `${h}:${m}`))); }
    for(let h=15; h<24; h++) { ['00','30'].forEach(m => { if(!(h==15&&m=='00')) e.add(new Option(`${h}:${m}`, `${h}:${m}`)); }); }
    for(let h=0; h<=2; h++) { ['00','30'].forEach(m => e.add(new Option(`${h}:${m}`, `${h}:${m}`))); }
    e.add(new Option("жңҖзөӮгҒҫгҒ§", "жңҖзөӮгҒҫгҒ§"));
    s.value = "19:00"; e.value = "жңҖзөӮгҒҫгҒ§";
  }

  document.addEventListener('DOMContentLoaded', function() {
    initTimeSelect();
    calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      initialView: 'dayGridMonth', locale: 'ja', height: 'auto',
      headerToolbar: { left: 'prev', center: 'title', right: 'next' },
      dayMaxEvents: 4, 
      eventClassNames: (arg) => arg.event.extendedProps.isConfirmed ? ['confirmed-ultra'] : [],
      events: (info, success) => google.script.run.withSuccessHandler(data => { allEvents=data; success(data); }).getEvents(),
      dateClick: (info) => { selectedDateStr = info.dateStr; openDayModal(info.dateStr); },
      eventClick: (info) => { info.jsEvent.preventDefault(); currentEventId = info.event.id; openEditModal(info.event); }
    });
    calendar.render();
    google.script.run.withSuccessHandler(m => { const sel = document.getElementById('user-name'); m.forEach(name => sel.add(new Option(name, name))); }).getMembers();
  });

  function openDayModal(dateStr) {
    selectedDateStr = dateStr; document.getElementById('target-date-title').innerText = dateStr;
    const list = document.getElementById('day-event-list'); list.innerHTML = '';
    const dayEvents = allEvents.filter(e => e.start.startsWith(dateStr));
    dayEvents.sort((a, b) => a.start.localeCompare(b.start));
    if(!dayEvents.length) list.innerHTML = '<p style="text-align:center; color:#444;">NO SCHEDULE</p>';
    dayEvents.forEach(e => {
      const div = document.createElement('div'); div.className = 'event-list-item';
      div.onclick = () => { currentEventId = e.id; openEditModal(e); };
      div.innerHTML = `<div><strong>${e.title}</strong></div><span class="status-badge ${e.extendedProps.isConfirmed ? 'is-confirmed' : ''}">${e.extendedProps.isConfirmed ? 'зўәе®ҡ' : 'еёҢжңӣ'}</span>`;
      list.appendChild(div);
    });
    hideAllModals(); document.getElementById('day-modal').style.display = 'flex';
  }

  function openRegModal() { hideAllModals(); document.getElementById('reg-modal').style.display = 'flex'; }
  function openEditModal(e) { 
    hideAllModals(); 
    currentEventId = e.id || currentEventId; 
    const isConf = e.extendedProps ? e.extendedProps.isConfirmed : e.title.includes('вҳ…зўәе®ҡ');
    document.getElementById('confirm-btn-trigger').style.display = isConf ? 'none' : 'block'; 
    document.getElementById('edit-modal').style.display = 'flex'; 
  }
  
  function openPinModal() { document.getElementById('edit-modal').style.display = 'none'; document.getElementById('pin-modal').style.display = 'flex'; }
  function closePinModal() { document.getElementById('pin-modal').style.display = 'none'; document.getElementById('edit-modal').style.display = 'flex'; }
  function openDeleteConfirm() { document.getElementById('edit-modal').style.display = 'none'; document.getElementById('delete-confirm-modal').style.display = 'flex'; }
  function closeDeleteConfirm() { document.getElementById('delete-confirm-modal').style.display = 'none'; document.getElementById('edit-modal').style.display = 'flex'; }

  function showAlert(title, msg) { document.getElementById('alert-title').innerText = title; document.getElementById('alert-msg').innerText = msg; document.getElementById('alert-modal').style.display = 'flex'; }
  function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }
  function backToDay() { openDayModal(selectedDateStr); }
  function hideAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('pin').value = ''; }
  function showLoading(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }

  function saveEvent() {
    showLoading(true);
    google.script.run.withSuccessHandler(() => { showLoading(false); hideAllModals(); calendar.refetchEvents(); showAlert("SUCCESS", "еёҢжңӣгӮ’йҖҒдҝЎгҒ—гҒҫгҒ—гҒҹ"); })
      .createShiftEvent(selectedDateStr, document.getElementById('start-t').value, document.getElementById('end-t').value, document.getElementById('user-name').value);
  }

  function executeConfirm() {
    const pin = document.getElementById('pin').value;
    if(!pin) return showAlert("ERROR", "жҡ—иЁјз•ӘеҸ·гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");
    showLoading(true);
    google.script.run.withSuccessHandler(() => { showLoading(false); hideAllModals(); calendar.refetchEvents(); showAlert("SUCCESS", "зўәе®ҡгҒ—гҒҫгҒ—гҒҹ"); })
      .withFailureHandler(err => { showLoading(false); showAlert("ERROR", err.message); }).confirmEvent(currentEventId, pin);
  }

  function finalDeleteAction() {
    showLoading(true);
    google.script.run.withSuccessHandler(() => { showLoading(false); hideAllModals(); calendar.refetchEvents(); showAlert("SUCCESS", "еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ"); }).deleteEvent(currentEventId);
  }
</script>
</body>
</html>
